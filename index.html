<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제일기획 용어 도우미</title>

<!-- Firebase SDK (import 없이 script 태그로 직접 로드) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px; }
#lockScreen { width:100%;max-width:380px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px 32px;display:flex;flex-direction:column;align-items:center;gap:20px;backdrop-filter:blur(20px);box-shadow:0 30px 80px rgba(0,0,0,0.5); }
.lock-icon { width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#e63946,#f4a261);display:flex;align-items:center;justify-content:center;font-size:28px; }
.lock-title { color:#fff;font-size:18px;font-weight:700;text-align:center; }
.lock-sub { color:rgba(255,255,255,0.45);font-size:13px;text-align:center;margin-top:-10px; }
#pwInput { width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px 18px;color:#fff;font-size:15px;outline:none;font-family:inherit;text-align:center;letter-spacing:3px; }
#pwInput::placeholder { letter-spacing:0;color:rgba(255,255,255,0.3); }
#pwError { color:#ff6b6b;font-size:13px;min-height:18px;text-align:center; }
#pwBtn { width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,#e63946,#f4a261);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit; }
#mainApp { display:none;width:100%;max-width:680px;height:90vh;max-height:800px;flex-direction:column;border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.5); }
.header { background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);padding:18px 24px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:12px;flex-shrink:0; }
.header-icon { width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#e63946,#f4a261);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0; }
.header-title { color:#fff;font-weight:700;font-size:16px; }
.header-sub { color:rgba(255,255,255,0.5);font-size:12px;margin-top:2px; }
.header-right { margin-left:auto;display:flex;align-items:center;gap:10px; }
.status { display:flex;align-items:center;gap:6px; }
.dot { width:8px;height:8px;border-radius:50%;background:#4ade80; }
.status span { color:#4ade80;font-size:12px; }
#addBtn { background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:6px 12px;color:#fff;font-size:12px;cursor:pointer;font-family:inherit; }
.messages { flex:1;overflow-y:auto;padding:20px;background:rgba(255,255,255,0.02);display:flex;flex-direction:column;gap:14px; }
.msg { display:flex;gap:10px;align-items:flex-end; }
.msg.user { justify-content:flex-end; }
.avatar { width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#e63946,#f4a261);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; }
.bubble { max-width:78%;padding:12px 16px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:keep-all; }
.bubble.bot { border-radius:18px 18px 18px 4px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1);color:#fff; }
.bubble.user { border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,#e63946,#f4a261);color:#fff; }
.term-card { background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:12px 14px;margin-top:8px; }
.term-name { font-weight:700;color:#f4a261;font-size:15px;margin-bottom:4px; }
.term-cat { font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px; }
.term-def { color:rgba(255,255,255,0.85);font-size:13px;line-height:1.6; }
.term-badge { display:inline-block;font-size:10px;background:rgba(74,222,128,0.2);border:1px solid rgba(74,222,128,0.3);color:#4ade80;border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle; }
.suggestions { display:flex;flex-wrap:wrap;gap:8px;margin-top:10px; }
.chip { background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:7px 14px;color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;font-family:inherit; }
.hint { color:rgba(255,255,255,0.35);font-size:12px;text-align:center;margin-bottom:6px; }
.input-area { background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.1);padding:14px 18px;display:flex;gap:10px;align-items:center;flex-shrink:0; }
#chatInput { flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit; }
#chatInput::placeholder { color:rgba(255,255,255,0.3); }
#chatBtn { width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#e63946,#f4a261);border:none;cursor:pointer;font-size:18px;flex-shrink:0; }
#modal { display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px; }
#modal.open { display:flex; }
.modal-box { width:100%;max-width:440px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:28px 24px;display:flex;flex-direction:column;gap:14px; }
.modal-title { color:#fff;font-size:16px;font-weight:700; }
.modal-sub { color:rgba(255,255,255,0.45);font-size:13px;margin-top:-8px; }
.modal-label { color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:4px; }
.modal-input,.modal-textarea,.modal-select { width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:11px 14px;color:#fff;font-size:14px;outline:none;font-family:inherit; }
.modal-textarea { resize:vertical;min-height:80px; }
.modal-select option { background:#1a1a2e; }
.modal-btns { display:flex;gap:10px;margin-top:4px; }
.modal-cancel { flex:1;padding:12px;border-radius:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:14px;cursor:pointer;font-family:inherit; }
.modal-submit { flex:2;padding:12px;border-radius:12px;background:linear-gradient(135deg,#e63946,#f4a261);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit; }
#modalError { color:#ff6b6b;font-size:13px;min-height:16px; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2);border-radius:4px; }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-icon">🔐</div>
  <div class="lock-title">제일기획 용어 도우미</div>
  <div class="lock-sub">접근하려면 비밀번호를 입력해주세요</div>
  <input id="pwInput" type="password" placeholder="비밀번호 입력" />
  <div id="pwError"></div>
  <button id="pwBtn" type="button">입장하기</button>
</div>

<div id="mainApp">
  <div class="header">
    <div class="header-icon">📘</div>
    <div>
      <div class="header-title">제일기획 용어 도우미</div>
      <div class="header-sub">필수 용어집 기반 검색 챗봇 · 뭐든 물어봐요!</div>
    </div>
    <div class="header-right">
      <button id="addBtn" type="button">➕ 용어 추가</button>
      <div class="status"><div class="dot"></div><span>온라인</span></div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input id="chatInput" type="text" placeholder="궁금한 용어를 입력해봐요..." />
    <button id="chatBtn" type="button">🔍</button>
  </div>
</div>

<div id="modal">
  <div class="modal-box">
    <div class="modal-title">✏️ 새 용어 추가</div>
    <div class="modal-sub">추가하면 모든 사용자에게 즉시 반영돼요!</div>
    <div>
      <div class="modal-label">용어 이름 *</div>
      <input id="newName" class="modal-input" type="text" placeholder="예) 온보딩, 캠페인 브리프" />
    </div>
    <div>
      <div class="modal-label">카테고리 *</div>
      <select id="newCat" class="modal-select">
        <option value="AE > 일반">AE > 일반</option>
        <option value="미디어 > 일반">미디어 > 일반</option>
        <option value="제작 > 일반">제작 > 일반</option>
        <option value="디지털 > 일반">디지털 > 일반</option>
        <option value="BE > 일반">BE > 일반</option>
        <option value="공통 > 사내 용어">공통 > 사내 용어</option>
        <option value="공통 > 약어">공통 > 약어</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div>
      <div class="modal-label">설명 *</div>
      <textarea id="newDef" class="modal-textarea" placeholder="용어에 대한 설명을 입력해주세요"></textarea>
    </div>
    <div id="modalError"></div>
    <div class="modal-btns">
      <button id="modalCancel" class="modal-cancel" type="button">취소</button>
      <button id="modalSubmit" class="modal-submit" type="button">추가하기 🚀</button>
    </div>
  </div>
</div>

<script>
var CORRECT_PW = '2026AE';
var db = null;
var firebaseTerms = [];

var BASE_GLOSSARY = [
  { name:"견적서", category:"AE > 비용/견적", def:"캠페인 제작비에 대한 산출 내역. (1) 광고주 청구 견적, (2) 외주 견적으로 나뉜다. (1)-(2) = 제일기획의 수수료(매출총이익)." },
  { name:"사전견적", category:"AE > 비용/견적", def:"실제 콘텐츠 제작 전의 가견적. 외주업체에게 먼저 받고, 광고주 청구 견적을 작성·제출한다." },
  { name:"완료견적", category:"AE > 비용/견적", def:"콘텐츠 온에어 후 모든 제작 작업이 종료되었을 때 최종으로 지불/청구해야 하는 금액. AE 업무의 꽃★" },
  { name:"취급고", category:"AE > 비용/견적", def:"해당 캠페인의 제작비+매체비를 합친 금액." },
  { name:"외주비", category:"AE > 비용/견적", def:"캠페인 제작비 중 외주업체에게 지불되는 총 금액. 최대한 Down, 무조건 Down!" },
  { name:"정가항목", category:"AE > 비용/견적", def:"광고주 청구 견적은 정가항목+외주비+대행수수료로 구성. 기본 인건비에 가격을 매겨 청구하는 항목." },
  { name:"진행비", category:"AE > 비용/견적", def:"캠페인 제작 목적으로 쓰인 경비 일체. 교통비, 촬영장 식사비 등." },
  { name:"내수", category:"AE > 비용/실적", def:"(광고주 완료견적 - 외주비 완료견적)의 금액. 공식 수수료율 17.65%. 내수율: (광고주 청구가-외주비)/광고주 청구가." },
  { name:"매출총이익", category:"AE > 비용/실적", def:"캠페인 집행을 통해 제일기획이 얻게 되는 순수익. 보통 '매총'이라고 부른다." },
  { name:"매총", category:"AE > 비용/실적", def:"매출총이익의 줄임말. AE는 이 매총에 울고 웃는다." },
  { name:"영업이익", category:"AE > 비용/실적", def:"매출총이익에서 내부 인건비를 제외한 금액." },
  { name:"청구", category:"AE > 비용/청구&지급", def:"(1) 제작비 청구: 매출 세금계산서 발행. (2) 매체비 청구: 매출/위수탁 세금계산서 발행." },
  { name:"지급", category:"AE > 비용/청구&지급", def:"외주업체에게 작업비용을 지불하는 과정." },
  { name:"세금계산서", category:"AE > 비용/청구&지급", def:"(1) 양자: 광고주-제일기획 간 거래. (2) 위수탁: 광고주-제일기획-매체사 간 거래." },
  { name:"거래명세표", category:"AE > 비용/청구&지급", def:"청구 거래에 대한 내역이자 증빙 서류." },
  { name:"경비", category:"AE > 비용/경비", def:"월별로 부서에 제공되는 법인카드 소진 가능 금액." },
  { name:"부서회의비", category:"AE > 비용/경비", def:"부서원들끼리 사용하는 비용. 점심 식사, 커피, 간식대 등." },
  { name:"접대비", category:"AE > 비용/경비", def:"광고주와 긍정적인 관계 형성을 위해 사용한 금액. 보통 임원+팀장님께서 사용." },
  { name:"Project", category:"AE > 프로젝트 매니지먼트", def:"Gate 시스템 내에서 관리되는 광고 캠페인의 가장 상위 단위. 하위 개념으로 Job이 있다." },
  { name:"Job", category:"AE > 프로젝트 매니지먼트", def:"프로젝트의 하위 개념. 흔히 '잡 딴다'고 표현한다." },
  { name:"스태핑", category:"AE > 프로젝트 매니지먼트", def:"잡 리퀘스트 시, 해당 잡에 투입되는 제작/매체/BE 등 모든 인원을 선정하는 것." },
  { name:"투입률", category:"AE > 프로젝트 매니지먼트", def:"해당 잡에 스태프 인원이 투입한 시간. 타임 리포트 내 잡에 기입한 시간." },
  { name:"GRP", category:"미디어 > TV 효율지표", def:"Gross Rating Points. 집행 스케줄 중 광고시청률의 총합. 예) 뉴스데스크 2% + 주말연속극 3% = GRP 5." },
  { name:"CPRP", category:"미디어 > TV 효율지표", def:"Cost Per Rating Points. 1 GRP를 얻기 위해 필요한 비용. 총광고비/GRP로 계산." },
  { name:"Reach", category:"미디어 > TV 효율지표", def:"도달. 광고에 노출된 타깃의 비율. R+1: 최소 1번, R+3: 최소 3번 이상 노출된 비율." },
  { name:"CPM", category:"미디어 > 디지털 효율지표", def:"Cost Per Mile. 1,000명에게 도달하는 데 필요한 비용." },
  { name:"CPV", category:"미디어 > 디지털 효율지표", def:"Cost Per View. 1조회를 얻는 데 필요한 비용. 매체별로 조회 기준이 상이함." },
  { name:"CPC", category:"미디어 > 디지털 효율지표", def:"Cost Per Click. 1클릭을 얻는 데 필요한 비용." },
  { name:"CPA", category:"미디어 > 디지털 효율지표", def:"Cost Per Action. 목표 행동(구매, 가입 등) 1건당 필요한 비용." },
  { name:"CTR", category:"미디어 > 디지털 효율지표", def:"Click Through Rate. 클릭률. 광고 노출 대비 클릭 수의 비율." },
  { name:"CVR", category:"미디어 > 디지털 효율지표", def:"Conversion Rate. 전환율. 광고 클릭 후 목표 행동으로 이어진 비율." },
  { name:"ROAS", category:"미디어 > 디지털 효율지표", def:"Return On Ad Spend. 광고비 대비 매출." },
  { name:"미디어 믹스", category:"미디어 > 미디어플래닝", def:"채널/상품별로 예산을 어떻게 분배할 것인지에 대한 계획." },
  { name:"청약", category:"미디어 > 미디어플래닝", def:"미디어믹스가 컨펌되면 렙사에 광고를 예약하는 것. 지상파TV는 매월 20일경 마감." },
  { name:"큐시트", category:"미디어 > 미디어플래닝", def:"TV광고 청약 완료 후 공유되는 일정표." },
  { name:"출고", category:"미디어 > 출고/심의", def:"제작물을 매체에 송출될 수 있는 상태로 전달하는 것." },
  { name:"지상파TV", category:"미디어 > 매체 종류", def:"KBS/MBC/SBS/EBS와 산하 지역 민방. 수수료율 13.5%." },
  { name:"종편", category:"미디어 > 매체 종류", def:"종합편성채널. JTBC, TV조선, 채널A, MBN. 수수료율 15%." },
  { name:"CATV", category:"미디어 > 매체 종류", def:"민간 사업자가 운영하는 방송국 채널들. 예) CJ ENM(tvN, Mnet). 수수료율 15%." },
  { name:"IPTV", category:"미디어 > 매체 종류", def:"통신사업자(BTV, Olleh TV, U+)들이 판매하는 광고상품. 수수료율 15%." },
  { name:"OOH", category:"미디어 > 매체 종류", def:"Out Of Home. 가정 밖에서 만나는 미디어. 수수료율 10%." },

function getAllTerms() { return BASE_GLOSSARY.concat(firebaseTerms); }
function normalize(str) { return str.toLowerCase().replace(/[\s\-_\/]/g,''); }

function search(query) {
  var q = normalize(query);
  if (!q) return [];
  var scored = getAllTerms().map(function(term) {
    var name=normalize(term.name), def=normalize(term.def), cat=normalize(term.category);
    var score=0;
    if(name===q) score+=100;
    else if(name.indexOf(q)!==-1||q.indexOf(name)!==-1) score+=60;
    if(def.indexOf(q)!==-1) score+=20;
    if(cat.indexOf(q)!==-1) score+=10;
    for(var i=0;i<q.length;i++) if(name.indexOf(q[i])!==-1) score+=1;
    return {term:term,score:score};
  });
  return scored.filter(function(s){return s.score>5;})
    .sort(function(a,b){return b.score-a.score;})
    .slice(0,5).map(function(s){return s.term;});
}

function addMessage(role, content, isHTML) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg '+role;
  if(role==='bot'){
    div.innerHTML='<div class="avatar">📘</div><div class="bubble bot"></div>';
    if(isHTML) div.querySelector('.bubble').innerHTML=content;
    else div.querySelector('.bubble').textContent=content;
  } else {
    div.innerHTML='<div class="bubble user"></div>';
    div.querySelector('.bubble').textContent=content;
  }
  msgs.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

function renderResults(query, results) {
  if(results.length===0){ addMessage('bot','"'+query+'"에 대한 용어를 찾지 못했어요 😅\n\n상단 ➕ 버튼으로 직접 추가해봐요!',false); return; }
  var html='<div style="margin-bottom:6px">📖 <b>"'+query+'"</b> '+(results.length===1?'찾았어요!':'관련 용어 '+results.length+'개 찾았어요!')+'</div>';
  results.forEach(function(term){
    var badge=term.isNew?'<span class="term-badge">NEW</span>':'';
    html+='<div class="term-card"><div class="term-name">'+term.name+badge+'</div><div class="term-cat">📂 '+term.category+'</div><div class="term-def">'+term.def+'</div></div>';
  });
  addMessage('bot',html,true);
}

function handleSend(text) {
  var query=(text!==undefined?text:document.getElementById('chatInput').value).trim();
  if(!query) return;
  document.getElementById('chatInput').value='';
  addMessage('user',query,false);
  var chips=document.getElementById('chips');
  if(chips) chips.remove();
  setTimeout(function(){ renderResults(query,search(query)); },200);
}

function openModal() { document.getElementById('modalError').textContent=''; document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function submitTerm() {
  var name=document.getElementById('newName').value.trim();
  var cat=document.getElementById('newCat').value;
  var def=document.getElementById('newDef').value.trim();
  var errEl=document.getElementById('modalError');
  if(!name||!def){ errEl.textContent='용어 이름과 설명은 필수예요!'; return; }
  var dup=getAllTerms().find(function(t){ return normalize(t.name)===normalize(name); });
  if(dup){ errEl.textContent='"'+name+'"은 이미 등록된 용어예요!'; return; }

  var submitBtn=document.getElementById('modalSubmit');
  submitBtn.textContent='추가 중...';
  submitBtn.disabled=true;

  db.collection('terms').add({
    name:name, category:cat, def:def, createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    closeModal();
    document.getElementById('newName').value='';
    document.getElementById('newDef').value='';
    errEl.textContent='';
    addMessage('bot','✅ "'+name+'" 용어가 추가됐어요! 모든 사용자에게 즉시 반영됩니다 🎉',false);
  }).catch(function(e){
    errEl.textContent='저장 중 오류: '+e.message;
    console.error(e);
  }).finally(function(){
    submitBtn.textContent='추가하기 🚀';
    submitBtn.disabled=false;
  });
}

function initFirebase() {

    authDomain: "cheilgrayword.firebaseapp.com",
    projectId: "cheilgrayword",

    messagingSenderId: "1066942473246",
    appId: "1:1066942473246:web:a933a6bcb1e8b5551cba0f"
  };
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();

  // 실시간 동기화
  db.collection('terms').onSnapshot(function(snapshot) {
    firebaseTerms = [];
    snapshot.forEach(function(doc) {
      var d = doc.data();
      firebaseTerms.push({ name:d.name, category:d.category, def:d.def, isNew:true, id:doc.id });
    });
    console.log('Firebase 동기화 완료, 추가 용어:', firebaseTerms.length);
  });
}
