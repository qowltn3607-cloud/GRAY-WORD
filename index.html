<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>제일기획 지식 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #0d0d14;
  --surface: #14141f;
  --surface2: #1c1c2e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --primary: #e63946;
  --secondary: #f4a261;
  --accent: #4ade80;
  --text: #f0f0f5;
  --text2: rgba(240,240,245,0.6);
  --text3: rgba(240,240,245,0.35);
  --tab-h: 52px;
  --header-h: 60px;
  --input-h: 68px;
}
* { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body {
  background:var(--bg);
  font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  padding:0;
}

/* ── LOCK ── */
#lockScreen {
  width:100%;max-width:360px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:40px 28px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
  margin:20px;
}
.lock-logo {
  width:60px;height:60px;border-radius:18px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.lock-title { font-size:17px;font-weight:700;text-align:center;letter-spacing:-0.3px; }
.lock-sub { color:var(--text3);font-size:13px;text-align:center;margin-top:-8px; }
#pwInput {
  width:100%;background:rgba(255,255,255,0.07);
  border:1px solid var(--border2);border-radius:14px;
  padding:14px 18px;color:#fff;font-size:15px;outline:none;
  font-family:inherit;text-align:center;letter-spacing:4px;
  transition:border .2s;
}
#pwInput:focus { border-color:var(--primary); }
#pwInput::placeholder { letter-spacing:0;color:var(--text3); }
#pwError { color:#ff6b6b;font-size:13px;min-height:18px;text-align:center; }
#pwBtn {
  width:100%;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:opacity .15s;
}
#pwBtn:active { opacity:.85; }

/* ── MAIN APP ── */
#mainApp {
  display:none;
  width:100%;max-width:700px;
  height:100vh;max-height:100vh;
  flex-direction:column;
  background:var(--surface);
  overflow:hidden;
}
@media(min-width:701px){
  body { padding:16px; }
  #mainApp { height:calc(100vh - 32px);max-height:860px;border-radius:20px;box-shadow:0 40px 80px rgba(0,0,0,0.5); }
}

/* ── HEADER ── */
.header {
  height:var(--header-h);
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  flex-shrink:0;
}
.header-icon {
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
}
.header-title { font-size:15px;font-weight:700;letter-spacing:-0.3px; }
.header-sub { color:var(--text3);font-size:11px;margin-top:1px; }
.header-right { margin-left:auto;display:flex;align-items:center;gap:8px; }
.status-dot { width:7px;height:7px;border-radius:50%;background:var(--accent); }
.status-txt { color:var(--accent);font-size:11px;font-weight:600; }
#addBtn {
  background:rgba(255,255,255,0.08);border:1px solid var(--border2);
  border-radius:8px;padding:6px 10px;color:var(--text2);font-size:12px;
  cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;
}
#addBtn:active { background:rgba(255,255,255,0.15); }

/* ── TABS ── */
.tabs {
  display:flex;height:var(--tab-h);
  background:var(--surface2);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab {
  flex:1;border:none;background:none;
  color:var(--text3);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
  position:relative;transition:color .2s;
  letter-spacing:-0.2px;
}
.tab.active { color:var(--text); }
.tab.active::after {
  content:'';position:absolute;bottom:0;left:16px;right:16px;
  height:2px;background:linear-gradient(90deg,var(--primary),var(--secondary));
  border-radius:2px 2px 0 0;
}
.tab-icon { font-size:15px; }

/* ── PANELS ── */
.panel { display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0; }
.panel.active { display:flex; }

/* ── CHAT MESSAGES ── */
.messages {
  flex:1;overflow-y:auto;
  padding:16px;
  display:flex;flex-direction:column;gap:12px;
  overscroll-behavior:contain;
}
.msg { display:flex;gap:8px;align-items:flex-end; }
.msg.user { justify-content:flex-end; }
.avatar {
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
}
.bubble {
  max-width:80%;padding:11px 14px;
  font-size:13.5px;line-height:1.65;word-break:keep-all;
}
.bubble.bot {
  border-radius:16px 16px 16px 4px;
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
}
.bubble.user {
  border-radius:16px 16px 4px 16px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;
}
.term-card {
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);
  border-radius:10px;padding:11px 13px;margin-top:8px;
}
.term-name { font-weight:700;color:var(--secondary);font-size:14px;margin-bottom:3px; }
.term-cat { font-size:11px;color:var(--text3);margin-bottom:5px; }
.term-def { color:rgba(255,255,255,0.82);font-size:13px;line-height:1.6; }
.term-badge {
  display:inline-block;font-size:10px;
  background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.3);
  color:var(--accent);border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle;
}
.ai-badge {
  display:inline-block;font-size:10px;
  background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);
  color:#f87171;border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle;
}
.suggestions { display:flex;flex-wrap:wrap;gap:7px;margin-top:10px; }
.chip {
  background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:20px;padding:6px 13px;color:var(--text2);font-size:12.5px;
  cursor:pointer;font-family:inherit;transition:background .15s;
}
.chip:active { background:rgba(255,255,255,0.15); }
.hint { color:var(--text3);font-size:12px;text-align:center;margin-bottom:6px; }
.typing { display:flex;gap:5px;align-items:center;padding:12px 16px; }
.typing span { width:7px;height:7px;background:var(--text3);border-radius:50%;animation:blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay:.2s; }
.typing span:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

/* ── INPUT AREA ── */
.input-area {
  height:var(--input-h);
  background:var(--surface2);border-top:1px solid var(--border);
  padding:0 14px;display:flex;gap:10px;align-items:center;flex-shrink:0;
}
#chatInput {
  flex:1;background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none;
  font-family:inherit;transition:border .2s;
}
#chatInput:focus { border-color:rgba(230,57,70,0.5); }
#chatInput::placeholder { color:var(--text3); }
#chatBtn {
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border:none;cursor:pointer;font-size:17px;transition:opacity .15s;
}
#chatBtn:active { opacity:.8; }

/* ── PROCESS PANEL ── */
.process-panel {
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
}
.process-search-wrap { position:relative;flex-shrink:0; }
#processSearch {
  width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:12px;padding:10px 14px 10px 38px;
  color:#fff;font-size:14px;outline:none;font-family:inherit;
  transition:border .2s;
}
#processSearch:focus { border-color:rgba(230,57,70,0.5); }
#processSearch::placeholder { color:var(--text3); }
.search-icon {
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:16px;pointer-events:none;
}
.process-list { display:flex;flex-direction:column;gap:8px; }
.process-card {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:border-color .2s;
}
.process-card:hover,.process-card:focus-within { border-color:var(--border2); }
.process-header {
  padding:14px 16px;display:flex;align-items:center;gap:10px;
}
.process-icon {
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.process-title { font-size:14px;font-weight:700;letter-spacing:-0.3px; }
.process-meta { font-size:11px;color:var(--text3);margin-top:2px; }
.process-chevron { margin-left:auto;color:var(--text3);font-size:18px;transition:transform .25s; }
.process-card.open .process-chevron { transform:rotate(180deg); }
.process-body {
  display:none;padding:0 16px 14px;
  border-top:1px solid var(--border);
  font-size:13px;line-height:1.7;color:rgba(255,255,255,0.8);
}
.process-card.open .process-body { display:block; }
.process-step {
  display:flex;gap:10px;align-items:flex-start;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);
}
.process-step:last-child { border-bottom:none; }
.step-num {
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;margin-top:2px;
}
.step-content { flex:1; }
.step-title { font-weight:600;font-size:13px;margin-bottom:2px;color:var(--text); }
.step-desc { font-size:12.5px;color:var(--text2); }
.step-tip {
  background:rgba(244,162,97,0.1);border-left:2px solid var(--secondary);
  border-radius:0 6px 6px 0;padding:6px 10px;
  font-size:12px;color:var(--secondary);margin-top:6px;
}
.process-tag {
  display:inline-block;font-size:10px;border-radius:5px;padding:2px 7px;
  background:rgba(255,255,255,0.08);color:var(--text3);margin-right:4px;
}
.process-empty { text-align:center;color:var(--text3);font-size:13px;padding:40px 20px; }
.add-process-btn {
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px;border-radius:12px;
  background:rgba(255,255,255,0.05);border:1px dashed var(--border2);
  color:var(--text3);font-size:13px;cursor:pointer;font-family:inherit;
  transition:background .15s;flex-shrink:0;
}
.add-process-btn:active { background:rgba(255,255,255,0.1); }

/* ── MODAL ── */
#modal {
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);
  align-items:flex-end;justify-content:center;
  padding:0;
}
@media(min-width:480px){
  #modal { align-items:center;padding:20px; }
  .modal-box { border-radius:20px;max-height:80vh; }
}
#modal.open { display:flex; }
.modal-box {
  width:100%;max-width:460px;
  background:#1a1a2e;border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:24px 20px;
  display:flex;flex-direction:column;gap:12px;
  max-height:90vh;overflow-y:auto;
}
.modal-handle {
  width:36px;height:4px;background:rgba(255,255,255,0.2);
  border-radius:2px;margin:0 auto -4px;flex-shrink:0;
}
@media(min-width:480px){ .modal-handle { display:none; } }
.modal-title { color:#fff;font-size:16px;font-weight:700; }
.modal-sub { color:var(--text3);font-size:13px;margin-top:-6px; }
.modal-label { color:var(--text2);font-size:13px;margin-bottom:4px; }
.modal-input,.modal-textarea,.modal-select {
  width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:11px;padding:10px 13px;color:#fff;font-size:14px;outline:none;font-family:inherit;
  transition:border .2s;
}
.modal-input:focus,.modal-textarea:focus,.modal-select:focus { border-color:rgba(230,57,70,0.5); }
.modal-textarea { resize:vertical;min-height:80px; }
.modal-select option { background:#1a1a2e; }
.modal-btns { display:flex;gap:10px;margin-top:4px; }
.modal-cancel {
  flex:1;padding:12px;border-radius:12px;
  background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  color:#fff;font-size:14px;cursor:pointer;font-family:inherit;
}
.modal-submit {
  flex:2;padding:12px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
}
#modalError,.process-modal-error { color:#ff6b6b;font-size:13px;min-height:16px; }

/* Scrollbar */
::-webkit-scrollbar { width:3px;height:3px; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15);border-radius:3px; }
</style>
</head>
<body>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lock-logo">🏢</div>
  <div class="lock-title">제일기획 지식 도우미</div>
  <div class="lock-sub">업무 용어 · 프로세스 가이드 통합 검색</div>
  <input id="pwInput" type="password" placeholder="비밀번호 입력" autocomplete="current-password" />
  <div id="pwError"></div>
  <button id="pwBtn" type="button">입장하기</button>
</div>

<!-- MAIN APP -->
<div id="mainApp">

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">🏢</div>
    <div>
      <div class="header-title">제일기획 지식 도우미</div>
      <div class="header-sub">용어집 · 프로세스 가이드 통합</div>
    </div>
    <div class="header-right">
      <button id="addBtn" type="button">➕ 용어 추가</button>
      <div class="status-dot"></div>
      <span class="status-txt">온라인</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="chat" type="button">
      <span class="tab-icon">💬</span>용어 검색
    </button>
    <button class="tab" data-tab="process" type="button">
      <span class="tab-icon">📋</span>프로세스 가이드
    </button>
  </div>

  <!-- CHAT PANEL -->
  <div class="panel active" id="panel-chat">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="chatInput" type="text" placeholder="궁금한 용어를 입력해봐요..." />
      <button id="chatBtn" type="button">🔍</button>
    </div>
  </div>

  <!-- PROCESS PANEL -->
  <div class="panel" id="panel-process">
    <div class="process-panel">
      <div class="process-search-wrap">
        <span class="search-icon">🔍</span>
        <input id="processSearch" type="text" placeholder="프로세스 검색..." />
      </div>
      <div class="process-list" id="processList"></div>
      <button class="add-process-btn" id="addProcessBtn" type="button">
        ✏️ 프로세스 가이드 추가 제안하기
      </button>
    </div>
  </div>

</div>

<!-- TERM ADD MODAL -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ 새 용어 추가</div>
    <div class="modal-sub">추가하면 모든 사용자에게 즉시 반영돼요!</div>
    <div>
      <div class="modal-label">용어 이름 *</div>
      <input id="newName" class="modal-input" type="text" placeholder="예) 온보딩, 캠페인 브리프" />
    </div>
    <div>
      <div class="modal-label">카테고리 *</div>
      <select id="newCat" class="modal-select">
        <option value="AE > 일반">AE > 일반</option>
        <option value="미디어 > 일반">미디어 > 일반</option>
        <option value="제작 > 일반">제작 > 일반</option>
        <option value="디지털 > 일반">디지털 > 일반</option>
        <option value="BE > 일반">BE > 일반</option>
        <option value="공통 > 사내 용어">공통 > 사내 용어</option>
        <option value="공통 > 약어">공통 > 약어</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div>
      <div class="modal-label">설명 *</div>
      <textarea id="newDef" class="modal-textarea" placeholder="용어에 대한 설명을 입력해주세요"></textarea>
    </div>
    <div id="modalError"></div>
    <div class="modal-btns">
      <button id="modalCancel" class="modal-cancel" type="button">취소</button>
      <button id="modalSubmit" class="modal-submit" type="button">추가하기 🚀</button>
    </div>
  </div>
</div>

<!-- PROCESS ADD MODAL -->
<div id="processModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">📋 프로세스 가이드 추가</div>
    <div class="modal-sub">업무 프로세스 지식을 공유해 주세요</div>
    <div>
      <div class="modal-label">프로세스 제목 *</div>
      <input id="procTitle" class="modal-input" type="text" placeholder="예) 완료견적 처리 절차" />
    </div>
    <div>
      <div class="modal-label">카테고리 *</div>
      <select id="procCat" class="modal-select">
        <option value="AE 업무">AE 업무</option>
        <option value="미디어 업무">미디어 업무</option>
        <option value="제작 업무">제작 업무</option>
        <option value="디지털 업무">디지털 업무</option>
        <option value="BE 업무">BE 업무</option>
        <option value="공통 행정">공통 행정</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div>
      <div class="modal-label">설명 (전체 흐름 요약) *</div>
      <textarea id="procDesc" class="modal-textarea" placeholder="어떤 프로세스인지 간단히 설명해주세요"></textarea>
    </div>
    <div>
      <div class="modal-label">단계별 절차 (줄바꿈으로 각 단계 구분) *</div>
      <textarea id="procSteps" class="modal-textarea" style="min-height:100px" placeholder="예)
브리프 접수 및 내용 확인
견적 요청서 작성
외주업체 견적 수령
광고주 견적서 작성"></textarea>
    </div>
    <div id="process-modal-error" class="process-modal-error"></div>
    <div class="modal-btns">
      <button id="procCancel" class="modal-cancel" type="button">취소</button>
      <button id="procSubmit" class="modal-submit" type="button">제출하기 🚀</button>
    </div>
  </div>
</div>

<style>
#processModal {
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);
  align-items:flex-end;justify-content:center;padding:0;

/* ──────────────────────────────────────
   SEARCH
────────────────────────────────────── */
function getAllTerms() { return BASE_GLOSSARY.concat(firebaseTerms); }
function normalize(str) { return str.toLowerCase().replace(/[\s\-_\/]/g,''); }

function search(query) {
  var q = normalize(query);
  if(!q) return [];
  var scored = getAllTerms().map(function(term){
    var name=normalize(term.name), def=normalize(term.def), cat=normalize(term.category);
    var score=0;
    if(name===q) score+=100;
    else if(name.indexOf(q)!==-1||q.indexOf(name)!==-1) score+=60;
    if(def.indexOf(q)!==-1) score+=20;
    if(cat.indexOf(q)!==-1) score+=10;
    for(var i=0;i<q.length;i++) if(name.indexOf(q[i])!==-1) score+=1;
    return {term:term,score:score};
  });
  return scored.filter(function(s){return s.score>5;})
    .sort(function(a,b){return b.score-a.score;})
    .slice(0,5).map(function(s){return s.term;});
}

────────────────────────────────────── */
function addMessage(role, content, isHTML) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg '+role;
  if(role==='bot'){
    div.innerHTML='<div class="avatar">🏢</div><div class="bubble bot"></div>';
    if(isHTML) div.querySelector('.bubble').innerHTML=content;
    else div.querySelector('.bubble').textContent=content;
  } else {
    div.innerHTML='<div class="bubble user"></div>';
    div.querySelector('.bubble').textContent=content;
  }
  msgs.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

function showTyping() {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className='msg bot'; div.id='typingIndicator';
  div.innerHTML='<div class="avatar">🏢</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}
function removeTyping() {
  var t=document.getElementById('typingIndicator');
  if(t) t.remove();
}

function renderResults(query, results) {
  if(results.length===0){
    addMessage('bot','"'+query+'"에 대한 용어를 찾지 못했어요 😅\n\n상단 ➕ 버튼으로 직접 추가하거나, 📋 프로세스 가이드 탭을 확인해봐요!',false);
    return;
  }
  var html='<div style="margin-bottom:6px">📖 <b>"'+query+'"</b> '+(results.length===1?'찾았어요!':'관련 용어 '+results.length+'개 찾았어요!')+'</div>';
  results.forEach(function(term){
    var badge=term.isNew?'<span class="term-badge">NEW</span>':'';
    html+='<div class="term-card"><div class="term-name">'+escapeHtml(term.name)+badge+'</div><div class="term-cat">📂 '+escapeHtml(term.category)+'</div><div class="term-def">'+escapeHtml(term.def)+'</div></div>';
  });
  addMessage('bot',html,true);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleSend(text) {
  var query=(text!==undefined?text:document.getElementById('chatInput').value).trim();
  if(!query) return;
  document.getElementById('chatInput').value='';
  addMessage('user',query,false);
  var chips=document.getElementById('chips');
  if(chips) chips.remove();

  showTyping();
  setTimeout(function(){
    removeTyping();
    renderResults(query, search(query));
  }, 300);
}

function getAllProcesses() { return BASE_PROCESSES.concat(firebaseProcesses); }

function renderProcessCard(proc) {
  var card = document.createElement('div');
  card.className = 'process-card';
  card.dataset.id = proc.id;

  var tags = (proc.tags||[]).map(function(t){ return '<span class="process-tag">'+escapeHtml(t)+'</span>'; }).join('');

  var stepsHtml = (proc.steps||[]).map(function(s,i){
    var tip = s.tip ? '<div class="step-tip">💡 '+escapeHtml(s.tip)+'</div>' : '';
    return '<div class="process-step"><div class="step-num">'+(i+1)+'</div><div class="step-content"><div class="step-title">'+escapeHtml(s.title)+'</div><div class="step-desc">'+escapeHtml(s.desc)+'</div>'+tip+'</div></div>';
  }).join('');

  card.innerHTML = '<div class="process-header">'
    +'<div class="process-icon" style="background:'+proc.color+'22;color:'+proc.color+'">'+proc.icon+'</div>'
    +'<div><div class="process-title">'+escapeHtml(proc.title)+'</div>'
    +'<div class="process-meta">'+escapeHtml(proc.category)+' &nbsp;·&nbsp; '+tags+'</div></div>'
    +'<span class="process-chevron">⌄</span>'
    +'</div>'
    +'<div class="process-body">'+
    '<div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:10px;line-height:1.6">'+escapeHtml(proc.desc)+'</div>'
    +stepsHtml+'</div>';

  card.querySelector('.process-header').addEventListener('click', function(){
    card.classList.toggle('open');
  });
  return card;
}

function renderProcessList(filter) {
  var list = document.getElementById('processList');
  list.innerHTML='';
  var all = getAllProcesses();
  var q = (filter||'').toLowerCase().replace(/\s/g,'');
  var filtered = q ? all.filter(function(p){
    return normalize(p.title).indexOf(q)!==-1
      || normalize(p.category).indexOf(q)!==-1
      || (p.tags||[]).some(function(t){ return normalize(t).indexOf(q)!==-1; });
  }) : all;

  if(!filtered.length){
    var empty=document.createElement('div');
    empty.className='process-empty';
    empty.textContent='검색 결과가 없어요 😅';
    list.appendChild(empty);
    return;
  }
  filtered.forEach(function(p){ list.appendChild(renderProcessCard(p)); });
}

function openModal() { document.getElementById('modalError').textContent=''; document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function submitTerm() {
  var name=document.getElementById('newName').value.trim();
  var cat=document.getElementById('newCat').value;
  var def=document.getElementById('newDef').value.trim();
  var errEl=document.getElementById('modalError');
  if(!name||!def){ errEl.textContent='용어 이름과 설명은 필수예요!'; return; }
  var dup=getAllTerms().find(function(t){ return normalize(t.name)===normalize(name); });
  if(dup){ errEl.textContent='"'+name+'"은 이미 등록된 용어예요!'; return; }
  var btn=document.getElementById('modalSubmit');
  btn.textContent='추가 중...'; btn.disabled=true;
  db.collection('terms').add({name:name,category:cat,def:def,createdAt:firebase.firestore.FieldValue.serverTimestamp()})
    .then(function(){
      closeModal();
      document.getElementById('newName').value='';
      document.getElementById('newDef').value='';
      errEl.textContent='';
      addMessage('bot','✅ "'+name+'" 용어가 추가됐어요! 🎉',false);
    }).catch(function(e){ errEl.textContent='저장 오류: '+e.message; })
    .finally(function(){ btn.textContent='추가하기 🚀'; btn.disabled=false; });
}

function openProcessModal() { document.getElementById('process-modal-error').textContent=''; document.getElementById('processModal').classList.add('open'); }
function closeProcessModal() { document.getElementById('processModal').classList.remove('open'); }

function submitProcess() {
  var title=document.getElementById('procTitle').value.trim();
  var cat=document.getElementById('procCat').value;
  var desc=document.getElementById('procDesc').value.trim();
  var stepsRaw=document.getElementById('procSteps').value.trim();
  var errEl=document.getElementById('process-modal-error');
  if(!title||!desc||!stepsRaw){ errEl.textContent='모든 항목을 입력해주세요!'; return; }

  var stepLines=stepsRaw.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  var steps=stepLines.map(function(line){ return {title:line,desc:''}; });
  var icons=['📋','💡','⚙️','🎯','✅','📊','🔧','📝'];
  var colors=['#e63946','#f4a261','#4ade80','#818cf8','#fb923c','#38bdf8','#f472b6','#a3e635'];
  var rand=Math.floor(Math.random()*icons.length);

  var btn=document.getElementById('procSubmit');
  btn.textContent='제출 중...'; btn.disabled=true;

  db.collection('processes').add({
    title:title,category:cat,desc:desc,steps:steps,
    icon:icons[rand],color:colors[rand],tags:[cat],
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    closeProcessModal();
    document.getElementById('procTitle').value='';
    document.getElementById('procDesc').value='';
    document.getElementById('procSteps').value='';
    errEl.textContent='';
    addMessage('bot','✅ 프로세스 가이드 "'+title+'"가 추가됐어요! 프로세스 탭에서 확인해봐요 🎉',false);
  }).catch(function(e){ errEl.textContent='저장 오류: '+e.message; })
    .finally(function(){ btn.textContent='제출하기 🚀'; btn.disabled=false; });
}

  // Chat events
  document.getElementById('chatBtn').onclick = function(){ handleSend(); };
  document.getElementById('chatInput').onkeydown = function(e){ if(e.key==='Enter') handleSend(); };

  // Term modal
  document.getElementById('addBtn').onclick = openModal;
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalSubmit').onclick = submitTerm;
  document.getElementById('modal').onclick = function(e){ if(e.target===document.getElementById('modal')) closeModal(); };

  // Process modal
  document.getElementById('addProcessBtn').onclick = openProcessModal;
  document.getElementById('procCancel').onclick = closeProcessModal;
  document.getElementById('procSubmit').onclick = submitProcess;
  document.getElementById('processModal').onclick = function(e){ if(e.target===document.getElementById('processModal')) closeProcessModal(); };

  // Process search
  document.getElementById('processSearch').oninput = function(){
    renderProcessList(this.value);
  };

  // Welcome message
  addMessage('bot','안녕하세요! 👋 제일기획 지식 도우미예요.\n\n💬 용어 검색 탭에서 실무 용어를 찾아보거나,\n📋 프로세스 가이드 탭에서 업무 절차를 확인해봐요!',false);

  var msgs=document.getElementById('messages');
  var chipsDiv=document.createElement('div');
  chipsDiv.id='chips';
  var hint=document.createElement('div');
  hint.className='hint'; hint.textContent='이런 거 검색해봐요 👇';
  chipsDiv.appendChild(hint);
  var wrap=document.createElement('div');
  wrap.className='suggestions';
  ['GRP가 뭐야?','내수 설명해줘','CPM이랑 CPV 차이','스태핑이 뭐야?','우라까이가 뭐야?','덱이 뭐야?'].forEach(function(q){
    var btn=document.createElement('button');
    btn.className='chip'; btn.type='button'; btn.textContent=q;
    btn.onclick=function(){ handleSend(q); };
    wrap.appendChild(btn);
  });
  chipsDiv.appendChild(wrap);
  msgs.appendChild(chipsDiv);
}

   BOOT
────────────────────────────────────── */
initFirebase();

document.getElementById('pwBtn').onclick = function(){
  if(document.getElementById('pwInput').value===CORRECT_PW){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('mainApp').style.display='flex';
    initApp();
  } else {
    document.getElementById('pwError').textContent='비밀번호가 틀렸어요! 🔒';
    document.getElementById('pwInput').value='';
  }
};
document.getElementById('pwInput').onkeydown = function(e){
  if(e.key==='Enter') document.getElementById('pwBtn').onclick();
};
</script>
